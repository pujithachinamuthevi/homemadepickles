{% extends 'admin_base.html' %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add New Product{% endblock %}
{% block content %}
<div class="admin-card" style="max-width:700px">
  <div class="admin-card-header"><h6>Product Details</h6></div>
  <div class="p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Product Name *</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Mango Pickle" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Category *</label>
        <select name="category" class="form-select" required>
          <option value="">Select Category</option>
          <option value="Pickles">Pickles</option>
          <option value="Snacks">Snacks</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Price (₹) *</label>
        <input type="number" name="price" class="form-control" step="0.01" min="0" placeholder="149.00" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4" placeholder="Product description..."></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label">Image Filename</label>
        <input type="text" name="image" class="form-control" placeholder="product.jpg">
        <small class="text-muted">Place image in static/images/ folder</small>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Save Product</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
