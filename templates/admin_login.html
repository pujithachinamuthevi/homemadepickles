<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Pickles & Snacks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>
<body class="admin-body" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="auth-card" style="max-width:400px;width:100%;">
    <div class="auth-header">
      <div class="auth-logo">🫙</div>
      <h2>Admin Login</h2>
      <p>Home Made Pickles & Snacks</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Admin Email</label>
        <input type="email" name="email" class="form-control auth-input" placeholder="admin@pickles.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control auth-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Login as Admin</button>
    </form>
    <div class="text-center mt-3">
      <small class="text-muted">Default: admin@pickles.com / admin123</small>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
