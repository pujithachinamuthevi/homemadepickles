{% extends 'admin_base.html' %}
{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block content %}
<div class="admin-card" style="max-width:700px">
  <div class="admin-card-header"><h6>Edit: {{ product.name }}</h6></div>
  <div class="p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Product Name *</label>
        <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Category *</label>
        <select name="category" class="form-select" required>
          <option value="Pickles" {% if product.category == 'Pickles' %}selected{% endif %}>Pickles</option>
          <option value="Snacks" {% if product.category == 'Snacks' %}selected{% endif %}>Snacks</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Price (₹) *</label>
        <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4">{{ product.description }}</textarea>
      </div>
      <div class="mb-4">
        <label class="form-label">Image Filename</label>
        <input type="text" name="image" class="form-control" value="{{ product.image }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Update Product</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
