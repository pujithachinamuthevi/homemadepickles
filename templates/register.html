{% extends 'base.html' %}
{% block title %}Register – Home Made Pickles & Snacks{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🫙</div>
      <h2>Create Account</h2>
      <p>Join us for authentic homemade flavors</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control auth-input" placeholder="Your full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control auth-input" placeholder="your@email.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control auth-input" placeholder="Create a password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
    </form>
    <div class="auth-footer mt-4 text-center">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</div>
{% endblock %}
