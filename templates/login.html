{% extends 'base.html' %}
{% block title %}Login – Home Made Pickles & Snacks{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🫙</div>
      <h2>Welcome Back!</h2>
      <p>Login to continue shopping</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control auth-input" placeholder="your@email.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control auth-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
    </form>
    <div class="auth-footer mt-4 text-center">
      Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
    </div>
  </div>
</div>
{% endblock %}
